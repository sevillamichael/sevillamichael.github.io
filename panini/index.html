<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Colección Panini</title>
    <meta name="description" content="Colección Panini de álbumes y sobres del Mundial de Fútbol 1970–2026." />
    <link rel="icon" type="image/x-icon" href="../assets/logos/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css?v=2" />
    <link rel="stylesheet" href="panini.css?v=2" />
  </head>
  <body>
    <svg aria-hidden="true" class="icon-sprite">
      <symbol id="icon-moon" viewBox="0 0 512 512">
        <path fill="currentColor" d="M283.211 512c78.962 0 151.079-35.925 198.857-94.792 7.068-8.708-.639-21.43-11.562-19.35-124.203 23.654-238.262-71.576-238.262-196.954 0-72.222 38.662-138.635 101.498-174.394 9.686-5.512 7.25-20.197-3.756-22.23A258.156 258.156 0 0 0 283.211 0c-141.309 0-256 114.511-256 256 0 141.309 114.511 256 256 256z"/>
      </symbol>
      <symbol id="icon-sun" viewBox="0 0 512 512">
        <path fill="currentColor" d="M256 160c-52.9 0-96 43.1-96 96s43.1 96 96 96 96-43.1 96-96-43.1-96-96-96zm246.4 80.5-94.7-47.3 33.5-100.4c4.5-13.6-8.4-26.5-21.9-21.9l-100.4 33.5-47.4-94.8c-6.4-12.8-24.6-12.8-31 0l-47.3 94.7L92.7 70.8c-13.6-4.5-26.5 8.4-21.9 21.9l33.5 100.4-94.7 47.4c-12.8 6.4-12.8 24.6 0 31l94.7 47.3-33.5 100.5c-4.5 13.6 8.4 26.5 21.9 21.9l100.4-33.5 47.3 94.7c6.4 12.8 24.6 12.8 31 0l47.3-94.7 100.4 33.5c13.6 4.5 26.5-8.4 21.9-21.9l-33.5-100.4 94.7-47.3c13-6.5 13-24.7.2-31.1zm-155.9 106c-49.9 49.9-131.1 49.9-181 0-49.9-49.9-49.9-131.1 0-181 49.9-49.9 131.1-49.9 181 0 49.9 49.9 49.9 131.1 0 181z"/>
      </symbol>
    </svg>

    <main class="page">
      <!-- ── Page header ──────────────────────────────────────────────────── -->
      <section class="inv-header">
        <button
          class="theme-toggle"
          id="theme-toggle"
          type="button"
          aria-label="Toggle dark mode"
          title="Toggle dark mode"
        >
          <svg class="theme-icon theme-icon-moon"><use href="#icon-moon"></use></svg>
          <svg class="theme-icon theme-icon-sun"><use href="#icon-sun"></use></svg>
        </button>
        <h1 class="inv-title">Colección Panini</h1>
        <div class="inv-stats" id="inv-stats"></div>
      </section>

      <!-- ── Card grid ───────────────────────────────────────────────────── -->
      <div class="albums-grid" id="albums-grid"></div>

      <!-- ── Gallery view (shown when a year is selected) ───────────────── -->
      <div class="gallery-view" id="gallery-view" hidden>
        <header class="gallery-header">
          <button class="gallery-back-btn" id="gallery-back">← Todos</button>
          <div class="gallery-title-wrap">
            <span class="gallery-host" id="gallery-host"></span>
            <h2 class="gallery-year" id="gallery-year"></h2>
          </div>
          <div class="gallery-nav">
            <button class="gallery-nav-btn" id="gallery-prev" aria-label="Anterior">&#8249;</button>
            <button class="gallery-nav-btn" id="gallery-next" aria-label="Siguiente">&#8250;</button>
          </div>
        </header>

        <section class="gallery-section" id="gallery-albums-section">
          <h3 class="gallery-section-label">Álbumes</h3>
          <div class="gallery-images" id="gallery-albums"></div>
        </section>

        <section class="gallery-section" id="gallery-sobres-section">
          <h3 class="gallery-section-label">Sobres</h3>
          <div class="gallery-images" id="gallery-sobres"></div>
        </section>
      </div>
    </main>

    <!-- ── Lightbox ───────────────────────────────────────────────────────── -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
      <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous">&#8249;</button>
      <button class="lightbox-next" id="lightbox-next" aria-label="Next">&#8250;</button>
      <img class="lightbox-img" id="lightbox-img" src="" alt="" />
    </div>

    <script>
      // ── Theme ──────────────────────────────────────────────────────────────
      (function () {
        const storageKey = "dark";
        const root   = document.documentElement;
        const toggle = document.getElementById("theme-toggle");
        const supportsDark = () =>
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const getTheme = () => {
          const saved = localStorage.getItem(storageKey);
          if (saved === "false") return "light";
          if (saved === "true")  return "dark";
          return supportsDark() ? "dark" : "light";
        };
        const applyTheme = theme => {
          root.setAttribute("data-theme", theme);
          if (toggle) {
            const label = theme === "dark" ? "Switch to light mode" : "Switch to dark mode";
            toggle.setAttribute("aria-label", label);
            toggle.setAttribute("title", label);
          }
        };
        let current = getTheme();
        applyTheme(current);
        if (toggle) {
          toggle.addEventListener("click", () => {
            current = current === "dark" ? "light" : "dark";
            localStorage.setItem(storageKey, JSON.stringify(current === "dark"));
            applyTheme(current);
          });
        }
      })();

      // ── Album data ─────────────────────────────────────────────────────────
      const ALBUMS = [
        { year: 1970, host: "México",                           postales: null, extras: 0  },
        { year: 1974, host: "Alemania",                         postales: 400, postalesConfirmed: false, extras: 0  },
        { year: 1978, host: "Argentina",                        postales: 400, postalesConfirmed: false, extras: 0  },
        { year: 1982, host: "España",                           postales: 427, postalesConfirmed: false, extras: 0  },
        { year: 1986, host: "México",                           postales: 427, extras: 0  },
        { year: 1990, host: "Italia",                           postales: 448, extras: 0  },
        { year: "story", host: "World Cup Story",               postales: 262, extras: null },
        { year: 1994, host: "Estados Unidos",                   postales: 444, extras: 0  },
        { year: 1998, host: "Francia",                          postales: 561, extras: 0,  actualizacion: true  },
        { year: 2002, host: "Corea del Sur / Japón",            postales: 576, extras: 0  },
        { year: 2006, host: "Alemania",                         postales: 596, extras: 0  },
        { year: 2010, host: "Sudáfrica",                        postales: 638, extras: 0,  cocaCola: 8,  cocaColaCollected: 0,  actualizacion: false },
        { year: 2014, host: "Brasil",                           postales: 639, extras: 0,  cocaCola: 8,  cocaColaCollected: 0,  actualizacion: true  },
        { year: 2018, host: "Rusia",                            postales: 669, extras: 0,  cocaCola: 9,  cocaColaCollected: 0,  actualizacion: false },
        { year: 2022, host: "Qatar",                            postales: 670, onyx: 669,  cocaCola: 14, cocaColaCollected: 0,  extras: 80, extrasCollected: 80, extrasConfirmed: true,  actualizacion: true  },
        { year: 2026, host: "Canadá / Estados Unidos / México", postales: null, cocaCola: 14, cocaColaCollected: 14, extras: 80, extrasCollected: 0,  extrasConfirmed: false, actualizacion: false },
      ];

      // ── Image probing ──────────────────────────────────────────────────────
      // Naming convention: assets/{folder}/{year}.jpg, {year}_1.jpg, {year}_2.jpg …
      const MAX_VARIANTS = 9;
      const imageCounts  = {}; // { 1990: { albumPaths: […], sobrePaths: […] } }

      function probeImage(src) {
        return new Promise(resolve => {
          const img  = new Image();
          img.onload = () => resolve(true);
          img.onerror = () => resolve(false);
          img.src = src;
        });
      }

      async function listImages(folder, year) {
        const srcs   = Array.from({ length: MAX_VARIANTS + 1 }, (_, i) => {
          const suffix = i === 0 ? "" : `_${i}`;
          return `../assets/${folder}/${year}${suffix}.jpg`;
        });
        const exists = await Promise.all(srcs.map(probeImage));
        const paths  = [];
        for (let i = 0; i < srcs.length; i++) {
          if (!exists[i]) break;
          paths.push(srcs[i]);
        }
        return paths;
      }

      // ── Card rendering ─────────────────────────────────────────────────────
      function renderGrid() {
        document.getElementById("albums-grid").innerHTML = ALBUMS.map(album => {
          const logoHtml = `<div class="card-logo">
              <img
                src="../assets/logos/${album.year}.png"
                alt="${album.year} logo"
                onerror="if(this.src.endsWith('.png')){this.src=this.src.replace('.png','.jpg')}else{this.style.display='none'}"
              />
            </div>`;
          const countsHtml = `<div class="card-counts">
              <div class="card-count-row">
                <span class="count-label" data-label="albums" data-year="${album.year}">Álbumes</span>
                <span class="count-val" data-type="albums" data-year="${album.year}">—</span>
              </div>
              <div class="card-count-row">
                <span class="count-label" data-label="sobres" data-year="${album.year}">Sobres</span>
                <span class="count-val" data-type="sobres" data-year="${album.year}">—</span>
              </div>
              <div class="card-count-row">
                <span class="count-label">Postales</span>
                <span class="count-val${album.postales !== null ? (album.postalesConfirmed === false ? ' is-pending' : ' is-confirmed') : ''}">${album.postales ?? "—"}</span>
              </div>
              ${album.onyx ? `<div class="card-count-row">
                <span class="count-label">Onyx</span>
                <span class="count-val is-confirmed">${album.onyx}</span>
              </div>` : ""}
              ${album.cocaCola !== undefined ? `<div class="card-count-row">
                <span class="count-label">Coca Cola</span>
                <span class="count-val ${album.cocaColaCollected !== undefined ? (album.cocaColaCollected === album.cocaCola ? 'is-confirmed' : 'is-pending') : 'is-confirmed'}">${album.cocaColaCollected !== undefined ? `${album.cocaColaCollected}/${album.cocaCola}` : album.cocaCola}</span>
              </div>` : ""}
              ${album.extras ? `<div class="card-count-row">
                <span class="count-label">Extras</span>
                <span class="count-val ${album.extrasConfirmed ? 'is-confirmed' : 'is-pending'}">${album.extrasCollected !== undefined ? `${album.extrasCollected}/${album.extras}` : album.extras}</span>
              </div>` : ""}
              ${album.actualizacion !== undefined ? `<div class="card-count-row">
                <span class="count-label">Actualización</span>
                <span class="count-val ${album.actualizacion ? 'is-confirmed' : 'is-pending'}"></span>
              </div>` : ""}
            </div>`;
          return `<article class="album-card" data-year="${album.year}">
            ${logoHtml}
            ${countsHtml}
          </article>`;
        }).join("");
      }

      // ── Stats ──────────────────────────────────────────────────────────────
      function updateStats() {
        let totalAlbums = 0, totalSobres = 0, totalSets = 0;
        let extrasConfirmed = 0, extrasTotal = 0;
        let actConfirmed = 0, actTotal = 0;
        ALBUMS.forEach(a => {
          const c = imageCounts[a.year];
          if (c) {
            totalAlbums += c.albumPaths.length;
            totalSobres += c.sobrePaths.length;
          }
          if (a.postales !== null && a.postalesConfirmed !== false) totalSets += 1;
          if (a.onyx !== undefined) totalSets += 1;
          if (a.extras) {
            extrasTotal++;
            if (a.extrasConfirmed) extrasConfirmed++;
          }
          if (a.actualizacion !== undefined) {
            actTotal++;
            if (a.actualizacion) actConfirmed++;
          }
        });

        const stat = (val, label, short) =>
          `<div class="inv-stat">
            <span class="inv-stat-value">${val}</span>
            <span class="inv-stat-label"${short ? ` data-short="${short}"` : ""}>${label}</span>
          </div>`;

        document.getElementById("inv-stats").innerHTML = `
          <div class="inv-stats-row">
            ${stat(totalAlbums, "Álbumes")}
            ${stat(totalSobres, "Sobres")}
            <div class="inv-stats-divider"></div>
            <div class="inv-stats-subgroup">
              <span class="inv-postales-label">Sets</span>
              <div class="inv-stats-row">
                ${stat(totalSets,                          "Postales")}
                ${stat(`${extrasConfirmed}/${extrasTotal}`, "Extras")}
                ${stat(`${actConfirmed}/${actTotal}`, "Actualización", "Act.")}
              </div>
            </div>
          </div>`;
      }

      // ── Gallery ────────────────────────────────────────────────────────────
      let currentGalleryYear = null;

      function navigableAlbums() {
        return ALBUMS.filter(a => {
          const c = imageCounts[a.year];
          return c && (c.albumPaths.length > 0 || c.sobrePaths.length > 0);
        });
      }

      function navigateGallery(dir) {
        const nav = navigableAlbums();
        const idx = nav.findIndex(a => a.year === currentGalleryYear);
        if (idx === -1) return;
        showGallery(nav[(idx + dir + nav.length) % nav.length].year);
      }

      function showGallery(year) {
        currentGalleryYear = year;
        const nav   = navigableAlbums();
        const hasNav = nav.length > 1;
        document.getElementById("gallery-prev").hidden = !hasNav;
        document.getElementById("gallery-next").hidden = !hasNav;

        const album    = ALBUMS.find(a => a.year === year);
        const counts   = imageCounts[year] || { albumPaths: [], sobrePaths: [] };
        const isStory  = year === "story";

        document.getElementById("gallery-year").textContent = isStory ? album.host : album.year;
        document.getElementById("gallery-host").textContent = isStory ? "" : album.host;

        function gridClass(n) {
          if (n >= 4) return "gallery-images cols-4";
          if (n === 3) return "gallery-images cols-3";
          if (n === 2) return "gallery-images cols-2";
          return "gallery-images";
        }

        const albumsSection = document.getElementById("gallery-albums-section");
        if (counts.albumPaths.length) {
          const an = counts.albumPaths.length;
          albumsSection.querySelector(".gallery-section-label").textContent =
            an === 1 ? "Álbum" : `Álbumes: ${an}`;
          const el = document.getElementById("gallery-albums");
          el.className = gridClass(counts.albumPaths.length);
          el.innerHTML = counts.albumPaths.map(src =>
            `<img class="gallery-img" src="${src}" alt="${year} album" />`
          ).join("");
          albumsSection.hidden = false;
        } else {
          albumsSection.hidden = true;
        }

        const sobresSection = document.getElementById("gallery-sobres-section");
        if (counts.sobrePaths.length) {
          const sn = counts.sobrePaths.length;
          sobresSection.querySelector(".gallery-section-label").textContent =
            sn === 1 ? "Sobre" : `Sobres: ${sn}`;
          const el = document.getElementById("gallery-sobres");
          el.className = gridClass(counts.sobrePaths.length);
          el.innerHTML = counts.sobrePaths.map(src =>
            `<img class="gallery-img" src="${src}" alt="${year} sobre" />`
          ).join("");
          sobresSection.hidden = false;
        } else {
          sobresSection.hidden = true;
        }

        document.getElementById("albums-grid").hidden  = true;
        document.getElementById("gallery-view").hidden = false;
      }

      function hideGallery() {
        document.getElementById("gallery-view").hidden = true;
        document.getElementById("albums-grid").hidden  = false;
      }

      // ── Events ─────────────────────────────────────────────────────────────
      document.getElementById("albums-grid").addEventListener("click", e => {
        const card = e.target.closest(".album-card");
        if (!card) return;
        const raw = card.dataset.year;
        showGallery(/^\d+$/.test(raw) ? Number(raw) : raw);
      });

      document.getElementById("gallery-back").addEventListener("click", hideGallery);
      document.getElementById("gallery-prev").addEventListener("click", () => navigateGallery(-1));
      document.getElementById("gallery-next").addEventListener("click", () => navigateGallery(1));

      // ── Lightbox ───────────────────────────────────────────────────────────
      const lightbox    = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const lbPrev      = document.getElementById("lightbox-prev");
      const lbNext      = document.getElementById("lightbox-next");

      let lbImages = [];
      let lbIndex  = 0;

      function openLightbox(images, index) {
        lbImages = images;
        lbIndex  = index;
        lbPrev.hidden = lbNext.hidden = images.length <= 1;
        updateLightboxImage();
        lightbox.classList.add("is-open");
        document.body.style.overflow = "hidden";
      }

      function updateLightboxImage() {
        lightboxImg.src = lbImages[lbIndex].src;
        lightboxImg.alt = lbImages[lbIndex].alt;
      }

      function lightboxNav(dir) {
        lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
        updateLightboxImage();
      }

      function closeLightbox() {
        lightbox.classList.remove("is-open");
        lightboxImg.src = "";
        document.body.style.overflow = "";
      }

      document.getElementById("gallery-view").addEventListener("click", e => {
        const img = e.target.closest(".gallery-img");
        if (!img) return;
        const section = img.closest("#gallery-albums, #gallery-sobres");
        const scope   = section || document.getElementById("gallery-view");
        const all     = [...scope.querySelectorAll(".gallery-img")];
        const images  = all.map(el => ({ src: el.src, alt: el.alt }));
        openLightbox(images, all.indexOf(img));
      });

      lightbox.addEventListener("click", closeLightbox);
      lbPrev.addEventListener("click", e => { e.stopPropagation(); lightboxNav(-1); });
      lbNext.addEventListener("click", e => { e.stopPropagation(); lightboxNav(1); });

      document.addEventListener("keydown", e => {
        if (lightbox.classList.contains("is-open")) {
          if (e.key === "Escape")     closeLightbox();
          if (e.key === "ArrowLeft")  lightboxNav(-1);
          if (e.key === "ArrowRight") lightboxNav(1);
        } else if (!document.getElementById("gallery-view").hidden) {
          if (e.key === "ArrowLeft")  navigateGallery(-1);
          if (e.key === "ArrowRight") navigateGallery(1);
        }
      });

      // ── Cache ──────────────────────────────────────────────────────────────
      // Bump CACHE_VER whenever you push new images so stale counts are dropped.
      const CACHE_VER = 2;
      const CACHE_KEY = `panini_counts_v${CACHE_VER}`;
      const CACHE_TTL = 4 * 60 * 60 * 1000; // 4 h

      // Remove any leftover entries from older versions.
      (function pruneOldCaches() {
        try {
          Object.keys(localStorage)
            .filter(k => k.startsWith("panini_counts_") && k !== CACHE_KEY)
            .forEach(k => localStorage.removeItem(k));
        } catch {}
      })();

      function loadCache() {
        try {
          const raw = localStorage.getItem(CACHE_KEY);
          if (!raw) return null;
          const { ts, data } = JSON.parse(raw);
          if (Date.now() - ts > CACHE_TTL) return null;
          return data;
        } catch { return null; }
      }

      function saveCache() {
        try {
          localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: imageCounts }));
        } catch {}
      }

      // ── Init ───────────────────────────────────────────────────────────────
      function applyCount(album, albumPaths, sobrePaths) {
        imageCounts[album.year] = { albumPaths, sobrePaths };
        const card   = document.querySelector(`.album-card[data-year="${album.year}"]`);
        const aEl    = document.querySelector(`[data-type="albums"][data-year="${album.year}"]`);
        const pEl    = document.querySelector(`[data-type="sobres"][data-year="${album.year}"]`);
        const aLabel = document.querySelector(`[data-label="albums"][data-year="${album.year}"]`);
        const pLabel = document.querySelector(`[data-label="sobres"][data-year="${album.year}"]`);
        if (aEl) aEl.textContent = albumPaths.length;
        if (pEl) pEl.textContent = sobrePaths.length;
        if (aLabel) aLabel.textContent = albumPaths.length === 1 ? "Álbum" : "Álbumes";
        if (pLabel) pLabel.textContent = sobrePaths.length === 1 ? "Sobre" : "Sobres";
        if (card && albumPaths.length === 0 && sobrePaths.length === 0) {
          card.classList.add("is-empty");
        }
      }

      async function init() {
        renderGrid();

        const cached = loadCache();
        if (cached) {
          ALBUMS.forEach(album => {
            const c = cached[album.year];
            if (c) applyCount(album, c.albumPaths, c.sobrePaths);
          });
          updateStats();
          return;
        }

        await Promise.all(ALBUMS.map(async album => {
          const [albumPaths, sobrePaths] = await Promise.all([
            listImages("albums", album.year),
            listImages("sobres", album.year),
          ]);
          applyCount(album, albumPaths, sobrePaths);
        }));

        saveCache();
        updateStats();
      }

      init();
    </script>
  </body>
</html>
